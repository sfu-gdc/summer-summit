name: 'Test'

on: pull_request

permissions:
  contents: read

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup Environment
        uses: ./.github/actions/setup-env

      - parallel:
          - name: Svelte Check
            run: pnpm run check:svelte --fail-on-warnings

          - name: ESLint
            run: pnpm run lint:eslint

          - name: Prettier
            run: pnpm run lint:prettier

          - name: Vitest
            run: pnpm exec playwright install --with-deps && pnpm run test --project client --project server

          - name: Commit Message
            run: pnpm exec commitlint --from ${{ github.event.pull_request.base.sha }} --to ${{ github.event.pull_request.head.sha }} --verbose
