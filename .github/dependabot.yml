version: 2

updates:
  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'weekly'
    commit-message:
      prefix: 'ci'
    open-pull-requests-limit: 2
    groups:
      security:
        applies-to: security-updates
        patterns:
          - '*'
      version:
        applies-to: version-updates
        patterns:
          - '*'
  - package-ecosystem: 'npm'
    directory: '/'
    versioning-strategy: 'increase'
    schedule:
      interval: 'weekly'
    open-pull-requests-limit: 0
    commit-message:
      prefix: 'build(deps)'
    groups:
      security:
        applies-to: security-updates
        patterns:
          - '*'
      version:
        applies-to: version-updates
        patterns:
          - '*'
